      <h1>Remove a file from git repo</h1>
<h2>Without deleting the file from the file system</h2>
<p><code>git rm --cached &lt;file&gt;</code></p>
<h2>Deleting the file from the filesystem as well</h2>
<p><code>git rm &lt;file&gt;</code></p>
